<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Backup – Completed & To Be Scrapped</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #0f766e 0%, #134e4a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.75rem;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .content {
            padding: 30px;
        }

        .action-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .run-button {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(13, 148, 136, 0.3);
        }

        .run-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
        }

        .run-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .limit-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .limit-row label {
            font-weight: 500;
            color: #334155;
        }

        .limit-row input[type="number"] {
            width: 80px;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th,
        td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f1f5f9;
            font-weight: 600;
            color: #334155;
        }

        tr:hover {
            background: #f8fafc;
        }

        .message {
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-family: ui-monospace, monospace;
            font-size: 0.9rem;
        }

        .message.loading {
            background: #f1f5f9;
            color: #64748b;
        }

        .message.error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
        }

        .message.success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .count-badge {
            display: inline-block;
            background: #0d9488;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-left: 8px;
        }

        .photo-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0;
        }

        .photo-cell img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .photo-cell img:hover {
            border-color: #0d9488;
            box-shadow: 0 2px 8px rgba(13, 148, 136, 0.2);
        }

        .photo-cell a {
            display: block;
            line-height: 0;
        }

        .backup-btn {
            background: #0d9488;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .backup-btn:hover {
            background: #0f766e;
        }

        .backup-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Workshop Backup</h1>
            <p>Load workshops with status &quot;completed&quot; or &quot;to_be_scrapped&quot;</p>
        </div>
        <div class="content">
            <div class="action-section">
                <div class="limit-row">
                    <label for="limitInput">Max rows:</label>
                    <input type="number" id="limitInput" min="1" max="1000" value="2"
                        title="Number of rows to pull (1–1000)">
                </div>
                <button class="run-button" id="runBtn" type="button">Load completed & to be scrapped</button>
            </div>
            <div id="message" class="message" style="display: none;"></div>
            <div id="tableSection" style="display: none;">
                <div class="table-wrap">
                    <table id="dataTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script>
        const runBtn = document.getElementById('runBtn');
        const messageEl = document.getElementById('message');
        const tableSection = document.getElementById('tableSection');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');

        let currentRows = [];

        function setRowStatus(orderId, status, color = '#64748b') {
            const btn = document.querySelector(`.backup-btn[data-order-id="${orderId}"]`);
            if (!btn) return;
            let statusEl = btn.parentNode.querySelector('.row-status');
            if (!statusEl) {
                statusEl = document.createElement('div');
                statusEl.className = 'row-status';
                statusEl.style.fontSize = '0.75rem';
                statusEl.style.marginTop = '4px';
                btn.parentNode.appendChild(statusEl);
            }
            statusEl.textContent = status;
            statusEl.style.color = color;
        }

        async function backupUrl(url, orderId, type, index) {
            const res = await fetch('/.netlify/functions/workshop-backup_files', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'backupUrl', url, order_id: orderId, type, index })
            });

            if (res.status !== 200) {
                const text = await res.text();
                // If the response is not JSON, it might be a platform error like "TimeoutError"
                let errorMessage = 'Backup failed';
                try {
                    const data = JSON.parse(text);
                    errorMessage = data.error || data.message || errorMessage;
                } catch (_) {
                    errorMessage = text || `HTTP ${res.status}`;
                }
                throw new Error(errorMessage);
            }

            const data = await res.json();
            if (!data.success) throw new Error(data.error || 'Backup failed');
            return data.backup_url;
        }

        tableBody.addEventListener('click', async (e) => {
            const btn = e.target.closest('.backup-btn');
            if (!btn) return;
            const orderId = btn.getAttribute('data-order-id');
            if (!orderId) return;

            const row = currentRows.find(r => String(r.order_id) === String(orderId));
            if (!row) return;

            btn.disabled = true;
            setRowStatus(orderId, 'Starting backup...');

            try {
                // Simplified URL parsing logic similar to backend
                const parseField = (val) => {
                    if (!val) return [];
                    if (Array.isArray(val)) return val.flatMap(v => parseField(v)).filter(Boolean);
                    if (typeof val !== 'string') return [];

                    let current = val.trim();
                    if (current.startsWith('[') || current.startsWith('{') || (current.length > 2 && current.startsWith('"') && current.endsWith('"') && (current.includes('[') || current.includes('{')))) {
                        try {
                            const parsed = JSON.parse(current);
                            if (parsed !== current) {
                                return parseField(parsed);
                            }
                        } catch (e) { }
                    }
                    return [current];
                };

                const photoUrls = parseField(row.photo_urls);
                const fileUrls = parseField(row.file_urls);
                const total = photoUrls.length + fileUrls.length;

                if (total === 0) {
                    setRowStatus(orderId, 'No files to backup', '#b91c1c');
                    btn.disabled = false;
                    return;
                }

                const photos = [];
                const files = [];
                let count = 0;

                for (const url of photoUrls) {
                    count++;
                    setRowStatus(orderId, `Backing up photo ${count}/${total}...`);
                    const bUrl = await backupUrl(url, orderId, 'photo', count);
                    if (bUrl) photos.push(bUrl);
                }

                for (const url of fileUrls) {
                    count++;
                    setRowStatus(orderId, `Backing up file ${count}/${total}...`);
                    const bUrl = await backupUrl(url, orderId, 'file', count);
                    if (bUrl) files.push(bUrl);
                }

                setRowStatus(orderId, 'Saving links...');
                const saveRes = await fetch('/.netlify/functions/workshop-backup_files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'saveBackupLinks',
                        order_id: orderId,
                        categorizedBackups: { photos, files }
                    })
                });
                const saveData = await saveRes.json();
                if (!saveData.success) throw new Error(saveData.error || 'Failed to save results');

                setRowStatus(orderId, 'Backup Complete!', '#166534');

                // Update row in currentRows and refresh UI
                row.backup_files = { photos, files };
                const rowIdx = Array.from(tableBody.rows).findIndex(tr => tr.querySelector('.backup-btn')?.getAttribute('data-order-id') === String(orderId));
                if (rowIdx !== -1) {
                    const tr = tableBody.rows[rowIdx];
                    const keys = Object.keys(row).filter(k => !['display_photo_urls', 'display_file_urls'].includes(k));
                    const backupFilesIdx = keys.indexOf('backup_files') + 1; // +1 because of "Backup" button column
                    if (backupFilesIdx > 0 && tr.cells[backupFilesIdx]) {
                        tr.cells[backupFilesIdx].innerHTML = renderCell('backup_files', row.backup_files, row);
                    }
                }

            } catch (err) {
                console.error('Backup process failed. Full error details:', err);
                setRowStatus(orderId, 'Error: ' + err.message, '#b91c1c');
            } finally {
                btn.disabled = false;
            }
        });

        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            tableSection.style.display = 'none';
            messageEl.style.display = 'block';
            messageEl.textContent = 'Loading...';
            messageEl.className = 'message loading';

            try {
                const limitInput = document.getElementById('limitInput');
                const limit = Math.min(1000, Math.max(1, parseInt(limitInput.value, 10) || 2));
                const res = await fetch('/.netlify/functions/workshop-backup_files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getCompletedAndScrapped', limit })
                });
                const data = await res.json();

                if (!data.success) {
                    messageEl.textContent = data.message || data.error || JSON.stringify(data);
                    messageEl.className = 'message error';
                    return;
                }

                const rows = data.rows || [];
                currentRows = rows;
                messageEl.innerHTML = 'Loaded <span class="count-badge">' + (data.count || rows.length) + ' rows</span>';
                messageEl.className = 'message success';

                if (rows.length === 0) {
                    messageEl.textContent = 'No rows found.';
                    return;
                }

                const keys = Object.keys(rows[0]).filter(k => !['display_photo_urls', 'display_file_urls'].includes(k));
                if (!keys.includes('photo_url_text')) keys.splice(keys.indexOf('photo_urls') + 1, 0, 'photo_url_text');
                tableHead.innerHTML = '<tr><th>Backup</th>' + keys.map(k => '<th>' + escapeHtml(k) + '</th>').join('') + '</tr>';
                tableBody.innerHTML = rows.map(row => {
                    const photos = parseField(row.photo_urls);
                    const files = parseField(row.file_urls);
                    const total = photos.length + files.length;
                    const allSourceB2 = total > 0 && photos.every(isB2Url) && files.every(isB2Url);

                    const hasBackup = row.backup_files && (
                        (Array.isArray(row.backup_files) && row.backup_files.length > 0) ||
                        (row.backup_files.photos && row.backup_files.photos.length > 0) ||
                        (row.backup_files.files && row.backup_files.files.length > 0)
                    );

                    let actionCell = '';
                    if (total === 0) {
                        actionCell = '<span style="color:#94a3b8; font-size:0.8rem;">No files</span>';
                    } else if (hasBackup) {
                        actionCell = '<span style="color:#166534; font-weight:600; font-size:0.8rem;">Backed up</span>';
                    } else {
                        actionCell = '<button class="backup-btn" type="button" data-order-id="' + escapeHtml(String(row.order_id ?? '')) + '">Backup</button>';
                    }

                    return '<tr><td>' + actionCell + '</td>' +
                        keys.map(k => '<td>' + renderCell(k, row[k], row) + '</td>').join('') + '</tr>';
                }).join('');
                tableSection.style.display = 'block';
            } catch (err) {
                messageEl.textContent = 'Error: ' + err.message;
                messageEl.className = 'message error';
            } finally {
                runBtn.disabled = false;
            }
        });

        function escapeHtml(str) {
            if (str == null) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function isDisplayablePhotoUrl(url) {
            if (typeof url !== 'string' || !url.trim()) return false;
            const u = url.trim();
            // Allow relative proxy URLs or absolute external URLs
            return u.startsWith('/') || u.startsWith('https://') || u.startsWith('http://');
        }

        function isB2Url(url) {
            if (!url || typeof url !== 'string') return false;
            // Matches .s3.region.backblazeb2.com/ pattern (consistent with backend BACKBLAZE_S3_PATTERN)
            return /\.s3\.[\w-]+\.backblazeb2\.com\//.test(url.trim());
        }

        function getB2ProxyUrl(url) {
            if (!isB2Url(url)) return url;
            try {
                const u = new URL(url.trim());
                const key = u.pathname.replace(/^\//, '');
                if (!key) return url;
                // btoa in browser for base64url encoding (replace + with -, / with _, remove =)
                const encoded = btoa(key).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
                return `/.netlify/functions/b2-image?key=${encoded}`;
            } catch (e) {
                return url;
            }
        }

        function renderCell(key, value, row) {
            if (key === 'photo_url_text') {
                const urls = parseField(row.photo_urls);
                if (urls.length === 0) return '<span style="color:#94a3b8; font-style:italic;">No photos</span>';
                return '<div style="font-size:0.7rem; max-width:260px; word-break:break-all; color:#64748b; white-space:pre-wrap; line-height:1.2; padding:4px 0;">' +
                    urls.map(u => escapeHtml(u)).join('\n\n') +
                    '</div>';
            }
            if (key === 'backup_files' && value) {
                // Handle new object structure
                if (typeof value === 'object' && !Array.isArray(value)) {
                    let html = '<div style="display:flex; flex-direction:column; gap:8px;">';
                    const hasPhotos = Array.isArray(value.photos) && value.photos.length > 0;
                    const hasFiles = Array.isArray(value.files) && value.files.length > 0;

                    if (!hasPhotos && !hasFiles) return '<span style="color:#94a3b8; font-style:italic;">No backup files</span>';

                    if (hasPhotos) {
                        html += '<strong>Photos:</strong><div class="photo-cell">' + value.photos.map(url => {
                            const displayUrl = isB2Url(url) ? getB2ProxyUrl(url) : url;
                            return '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener"><img src="' + escapeHtml(displayUrl) + '" alt="Backup photo" onerror="this.src=\'https://placehold.co/80?text=Error\'"></a>';
                        }).join('') + '</div>';
                    }
                    if (hasFiles) {
                        html += '<strong>Files:</strong><div style="font-size:0.8rem; word-break:break-all;">' + value.files.map((url, i) =>
                            '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">File ' + (i + 1) + ' (' + escapeHtml(url) + ')</a>'
                        ).join('<br>') + '</div>';
                    }
                    html += '</div>';
                    return html;
                }
                // Handle old array structure
                if (Array.isArray(value)) {
                    return '<div class="photo-cell">' + value.map((url, i) => {
                        const displayUrl = isB2Url(url) ? getB2ProxyUrl(url) : url;
                        return '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener"><img src="' + escapeHtml(displayUrl) + '" alt="Backup file ' + (i + 1) + '" onerror="this.src=\'https://placehold.co/80?text=Error\'"></a>';
                    }).join('') + '</div>';
                }
            }

            const photoKeys = ['photo_urls'];
            if (photoKeys.includes(key)) {
                // Use display_photo_urls if available for better compatibility (presigned/public)
                const urls = (row && row.display_photo_urls && row.display_photo_urls.length > 0)
                    ? row.display_photo_urls.filter(isDisplayablePhotoUrl)
                    : parseField(value).filter(isDisplayablePhotoUrl);

                if (urls.length === 0) return escapeHtml(formatCell(value));

                return '<div class="photo-cell">' + urls.map(url => {
                    const displayUrl = isB2Url(url) ? getB2ProxyUrl(url) : url;
                    return '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener"><img src="' + escapeHtml(displayUrl) + '" alt="Photo" onerror="this.src=\'https://placehold.co/80?text=Error\'"></a>';
                }).join('') + '</div>';
            }
            return escapeHtml(formatCell(value));
        }

        // Robustly parse URLs from string, array, or nested JSON
        function parseField(value) {
            if (!value) return [];
            if (Array.isArray(value)) return value.flatMap(v => parseField(v)).filter(Boolean);
            if (typeof value !== 'string') return [];

            let current = value.trim();
            if (current.startsWith('[') || current.startsWith('{') || (current.length > 2 && current.startsWith('"') && current.endsWith('"') && (current.includes('[') || current.includes('{')))) {
                try {
                    const parsed = JSON.parse(current);
                    if (parsed !== current) {
                        return parseField(parsed);
                    }
                } catch (e) { }
            }
            return [current];
        }

        function formatCell(value) {
            if (value == null) return '';
            if (typeof value === 'object' && value !== null) return JSON.stringify(value);
            if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}/.test(value)) {
                try {
                    const d = new Date(value);
                    if (!isNaN(d.getTime())) return d.toLocaleString();
                } catch (_) { }
            }
            return String(value);
        }
    </script>
</body>

</html>
