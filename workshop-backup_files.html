<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Backup – Completed & To Be Scrapped</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #0f766e 0%, #134e4a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .header h1 { font-size: 1.75rem; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 0.95rem; }
        .content { padding: 30px; }
        .action-section { text-align: center; margin-bottom: 24px; }
        .run-button {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(13, 148, 136, 0.3);
        }
        .run-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
        }
        .run-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        .limit-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .limit-row label { font-weight: 500; color: #334155; }
        .limit-row input[type="number"] {
            width: 80px;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
        }
        .table-wrap {
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f1f5f9;
            font-weight: 600;
            color: #334155;
        }
        tr:hover { background: #f8fafc; }
        .message {
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-family: ui-monospace, monospace;
            font-size: 0.9rem;
        }
        .message.loading { background: #f1f5f9; color: #64748b; }
        .message.error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
        .message.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .count-badge {
            display: inline-block;
            background: #0d9488;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-left: 8px;
        }
        .photo-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0;
        }
        .photo-cell img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        .photo-cell img:hover {
            border-color: #0d9488;
            box-shadow: 0 2px 8px rgba(13, 148, 136, 0.2);
        }
        .photo-cell a {
            display: block;
            line-height: 0;
        }
        .backup-btn {
            background: #0d9488;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
        }
        .backup-btn:hover { background: #0f766e; }
        .backup-btn:disabled { background: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Workshop Backup</h1>
            <p>Load workshops with status &quot;completed&quot; or &quot;to_be_scrapped&quot;</p>
        </div>
        <div class="content">
            <div class="action-section">
                <div class="limit-row">
                    <label for="limitInput">Max rows:</label>
                    <input type="number" id="limitInput" min="1" max="1000" value="2" title="Number of rows to pull (1–1000)">
                </div>
                <button class="run-button" id="runBtn" type="button">Load completed & to be scrapped</button>
            </div>
            <div id="message" class="message" style="display: none;"></div>
            <div id="tableSection" style="display: none;">
                <div class="table-wrap">
                    <table id="dataTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script>
        const runBtn = document.getElementById('runBtn');
        const messageEl = document.getElementById('message');
        const tableSection = document.getElementById('tableSection');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');

        tableBody.addEventListener('click', async (e) => {
            const btn = e.target.closest('.backup-btn');
            if (!btn) return;
            const orderId = btn.getAttribute('data-order-id');
            if (!orderId) return;
            btn.disabled = true;
            try {
                const res = await fetch('/.netlify/functions/workshop-backup_files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'backupToPowerAutomate', order_id: orderId })
                });
                const data = await res.json();
                console.log('Backup response:', data);
            } catch (err) {
                console.log('Backup error:', err);
            } finally {
                btn.disabled = false;
            }
        });

        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            tableSection.style.display = 'none';
            messageEl.style.display = 'block';
            messageEl.textContent = 'Loading...';
            messageEl.className = 'message loading';

            try {
                const limitInput = document.getElementById('limitInput');
                const limit = Math.min(1000, Math.max(1, parseInt(limitInput.value, 10) || 2));
                const res = await fetch('/.netlify/functions/workshop-backup_files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getCompletedAndScrapped', limit })
                });
                const data = await res.json();

                if (!data.success) {
                    messageEl.textContent = data.message || data.error || JSON.stringify(data);
                    messageEl.className = 'message error';
                    return;
                }

                const rows = data.rows || [];
                messageEl.innerHTML = 'Loaded <span class="count-badge">' + (data.count || rows.length) + ' rows</span>';
                messageEl.className = 'message success';

                if (rows.length === 0) {
                    messageEl.textContent = 'No rows found.';
                    return;
                }

                const keys = Object.keys(rows[0]).filter(k => k !== 'display_photo_urls');
                tableHead.innerHTML = '<tr><th>Backup</th>' + keys.map(k => '<th>' + escapeHtml(k) + '</th>').join('') + '</tr>';
                tableBody.innerHTML = rows.map(row =>
                    '<tr><td><button class="backup-btn" type="button" data-order-id="' + escapeHtml(String(row.order_id ?? '')) + '">Backup</button></td>' +
                    keys.map(k => '<td>' + renderCell(k, row[k]) + '</td>').join('') + '</tr>'
                ).join('');
                tableSection.style.display = 'block';
            } catch (err) {
                messageEl.textContent = 'Error: ' + err.message;
                messageEl.className = 'message error';
            } finally {
                runBtn.disabled = false;
            }
        });

        function escapeHtml(str) {
            if (str == null) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function isDisplayablePhotoUrl(url) {
            if (typeof url !== 'string' || !url.trim()) return false;
            const u = url.trim();
            return u.startsWith('https://') || u.startsWith('http://');
        }

        function renderCell(key, value) {
            const photoKeys = ['photo_urls'];
            if (photoKeys.includes(key) && Array.isArray(value) && value.length > 0) {
                const urls = value.filter(isDisplayablePhotoUrl);
                if (urls.length === 0) return escapeHtml(formatCell(value));
                return '<div class="photo-cell">' + urls.map(url =>
                    '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' +
                    '<img src="' + escapeHtml(url) + '" alt="Workshop photo" loading="lazy">' +
                    '</a>'
                ).join('') + '</div>';
            }
            return escapeHtml(formatCell(value));
        }

        function formatCell(value) {
            if (value == null) return '';
            if (typeof value === 'object' && value !== null) return JSON.stringify(value);
            if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}/.test(value)) {
                try {
                    const d = new Date(value);
                    if (!isNaN(d.getTime())) return d.toLocaleString();
                } catch (_) {}
            }
            return String(value);
        }
    </script>
</body>
</html>
