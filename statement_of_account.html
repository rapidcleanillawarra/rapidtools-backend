<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statement of Account - Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .header h1 { font-size: 1.75rem; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 0.95rem; }
        
        /* Tabs System */
        .tabs-nav {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .tab-btn {
            flex: 1;
            padding: 16px;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }
        .tab-btn:hover {
            color: #4f46e5;
            background: #f1f5f9;
        }
        .tab-btn.active {
            color: #4f46e5;
            border-bottom: 3px solid #4f46e5;
            background: white;
        }
        .tab-content {
            padding: 30px;
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        .action-section { 
            margin-bottom: 24px; 
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .input-group {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
        }
        .input-group input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #4f46e5;
        }

        .run-button {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .run-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
        .run-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .response-container {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            min-height: 80px;
            margin-top: 20px;
        }
        .response-text {
            font-family: ui-monospace, monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .loading { color: #64748b; }
        .error { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
        .success { background: #f0fdf4; border-color: #bbf7d0; }

        /* Table Styling */
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .orders-table th, .orders-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .orders-table th {
            background: #f1f5f9;
            font-weight: 600;
            color: #334155;
        }
        .orders-table tr:hover {
            background: #f8fafc;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-dispatched { background: #dcfce7; color: #166534; }

        /* Statement PDF preview */
        .statement-pdf-preview {
            margin-top: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }
        .statement-pdf-preview iframe {
            display: block;
            width: 100%;
            min-height: 600px;
            height: 80vh;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Statement of Account</h1>
            <p>Management Portal</p>
        </div>

        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="openTab('fetchTab')">Fetch & Save Customers</button>
            <button class="tab-btn" onclick="openTab('calcTab')">Statement Table Calculation</button>
            <button class="tab-btn" onclick="openTab('processTab')">Generate PDF Process</button>
        </nav>

        <!-- Tab 1: Fetch & Save -->
        <div id="fetchTab" class="tab-content active">
            <div class="action-section">
                <p style="margin-bottom: 16px; color: #64748b; text-align: center;">
                    Fetch all customers with positive balance and save them to the database for today.
                </p>
                <button class="run-button" id="runBtn" type="button">Run Fetch & Save</button>
            </div>
            <div id="fetchResponse" class="response-container">
                <div class="response-text">Results will appear here...</div>
            </div>
        </div>

        <!-- Tab 2: Table Calculation -->
        <div id="calcTab" class="tab-content">
            <div class="action-section">
                <div class="input-group">
                    <label for="username">Customer Username</label>
                    <input type="text" id="username" placeholder="Enter username (e.g. john_doe)">
                </div>
                <div style="display: flex; gap: 12px; justify-content: center; width: 100%;">
                    <button class="run-button" id="generateBtn" type="button" style="background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);">Generate PDF</button>
                </div>
            </div>
            <div id="calcResponse" class="response-container">
                <div class="response-text">Results will appear here...</div>
                <div id="ordersList"></div>
            </div>
            <div id="statementPdfPreview" class="statement-pdf-preview" style="display: none;"></div>
        </div>

        <!-- Tab 3: Generate PDF Process -->
        <div id="processTab" class="tab-content">
            <div class="action-section">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px;">
                    <h2 style="font-size: 1.25rem; color: #1e293b;">Today's Generated Processes</h2>
                    <div>
                        <button class="run-button" id="startProcessBtn" style="padding: 10px 20px; margin-right: 8px;">Start</button>
                        <button class="run-button" id="refreshProcessBtn" style="padding: 10px 20px;">Refresh List</button>
                    </div>
                </div>
                <div id="processStatus" style="margin-bottom: 15px; font-size: 0.9rem; color: #64748b;"></div>
                <div class="table-wrap" style="width: 100%; overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px;">
                    <table class="orders-table" id="processTable">
                        <thead>
                            <tr>
                                <th>Customer</th>
                                <th>Balance</th>
                                <th>PDF</th>
                                <th>Sent</th>
                                <th>Email</th>
                                <th>Created At</th>
                            </tr>
                        </thead>
                        <tbody id="processTableBody">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 40px; color: #94a3b8;">Click refresh to load today's processes...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openTab(tabId) {
            // Hide all tab content
            const contents = document.getElementsByClassName('tab-content');
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove('active');
            }
            
            // Deactivate all tab buttons
            const buttons = document.getElementsByClassName('tab-btn');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            
            // Show current tab and activate button
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- Logic for Tab 1 (Fetch & Save) ---
        const runBtn = document.getElementById('runBtn');
        const fetchResponse = document.getElementById('fetchResponse');
        const fetchText = fetchResponse.querySelector('.response-text');

        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            fetchText.textContent = 'Loading...';
            fetchResponse.className = 'response-container loading';

            try {
                const res = await fetch('/.netlify/functions/statement_of_account-fetch_filter_save_customers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await res.json();
                fetchText.textContent = JSON.stringify(data, null, 2);
                fetchResponse.className = 'response-container ' + (data.success ? 'success' : 'error');
            } catch (err) {
                fetchText.textContent = 'Error: ' + err.message;
                fetchResponse.className = 'response-container error';
            } finally {
                runBtn.disabled = false;
            }
        });

        // --- Logic for Tab 2 (Table Calculation & PDF Generation) ---
        const usernameInput = document.getElementById('username');
        const calcResponse = document.getElementById('calcResponse');
        const calcText = calcResponse.querySelector('.response-text');
        const ordersList = document.getElementById('ordersList');
        const statementPdfPreview = document.getElementById('statementPdfPreview');
        const generateBtn = document.getElementById('generateBtn');

        generateBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            if (!username) {
                alert('Please enter a username');
                return;
            }

            generateBtn.disabled = true;
            const originalText = generateBtn.textContent;
            generateBtn.textContent = 'Calculating & Generating...';

            calcText.textContent = 'Fetching orders for ' + username + '...';
            calcResponse.className = 'response-container loading';
            ordersList.innerHTML = '';
            statementPdfPreview.style.display = 'none';
            statementPdfPreview.innerHTML = '';

            try {
                // Step 1: Calculate & get PDF HTML
                const calcRes = await fetch('/.netlify/functions/statement_of_account-statement_table_calculation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer_username: username })
                });
                const calcData = await calcRes.json();
                console.log('Fetched Orders Data:', calcData);

                if (!calcData.success) {
                    calcText.textContent = 'Error: ' + (calcData.message || 'Unknown error');
                    calcResponse.className = 'response-container error';
                    return;
                }

                calcText.textContent = `Found ${calcData.count} dispatched orders for ${username}`;
                calcResponse.className = 'response-container success';

                if (calcData.pdf_html) {
                    const iframe = document.createElement('iframe');
                    iframe.srcdoc = calcData.pdf_html;
                    statementPdfPreview.innerHTML = '';
                    statementPdfPreview.appendChild(iframe);
                    statementPdfPreview.style.display = 'block';
                } else if (calcData.count === 0) {
                    ordersList.innerHTML = '<p style="margin-top: 10px; color: #64748b;">No dispatched orders found for this customer.</p>';
                }

                // Step 2: Trigger PDF Generation
                console.log('Requesting Backend PDF Generation for:', username);
                generateBtn.textContent = 'Generating PDF...';

                const pdfRes = await fetch('/.netlify/functions/statement_of_account-statement_table_calculation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer_username: username,
                        action: 'generate_pdf'
                    })
                });

                const pdfData = await pdfRes.json();
                console.log('Backend PDF Response:', pdfData);

                if (pdfData.success) {
                    alert('PDF Generation Successful!');
                } else {
                    alert('Error generating PDF: ' + (pdfData.message || pdfData.error || 'Unknown error'));
                }
            } catch (err) {
                console.error('Error in calculation/PDF generation:', err);
                calcText.textContent = 'Error: ' + err.message;
                calcResponse.className = 'response-container error';
                alert('Error generating PDF: ' + err.message);
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = originalText;
            }
        });

        // --- Logic for Tab 3 (Generate PDF Process) ---
        const refreshProcessBtn = document.getElementById('refreshProcessBtn');
        const startProcessBtn = document.getElementById('startProcessBtn');
        const processTableBody = document.getElementById('processTableBody');
        const processStatus = document.getElementById('processStatus');
        let latestProcessRows = [];

        async function fetchTodayProcesses() {
            refreshProcessBtn.disabled = true;
            processStatus.textContent = 'Fetching processes...';
            processTableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">Loading...</td></tr>';

            try {
                const res = await fetch('/.netlify/functions/statement_of_account-get_today_processes');
                const data = await res.json();

                if (data.success) {
                    latestProcessRows = data.rows || [];
                    processStatus.textContent = `Found ${data.count} processes generated today.`;
                    renderProcessTable(data.rows);
                } else {
                    latestProcessRows = [];
                    processStatus.textContent = 'Error: ' + (data.error || 'Failed to fetch');
                    processTableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #b91c1c; padding: 40px;">Error: ${data.error}</td></tr>`;
                }
            } catch (err) {
                latestProcessRows = [];
                processStatus.textContent = 'Error: ' + err.message;
                processTableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #b91c1c; padding: 40px;">Error: ${err.message}</td></tr>`;
            } finally {
                refreshProcessBtn.disabled = false;
            }
        }

        function renderProcessTable(rows) {
            if (!rows || rows.length === 0) {
                processTableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #94a3b8;">No processes found for today.</td></tr>';
                return;
            }

            processTableBody.innerHTML = rows.map(row => {
                const date = new Date(row.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const sentBadge = row.sent 
                    ? '<span class="badge" style="background: #dcfce7; color: #166534;">YES</span>' 
                    : '<span class="badge" style="background: #fee2e2; color: #991b1b;">NO</span>';
                
                let pdfCellContent;
                if (!row.pdf_link) {
                    pdfCellContent = '<span style="color: #94a3b8;">N/A</span>';
                } else if (row.pdf_link === 'No Orders' || row.pdf_link === 'Grand Total is 0') {
                    pdfCellContent = `<span style="color: #64748b; font-weight: 600;">${row.pdf_link}</span>`;
                } else {
                    pdfCellContent = `<a href="${row.pdf_link}" target="_blank" style="color: #4f46e5; text-decoration: none; font-weight: 600;">View PDF</a>`;
                }

                return `
                    <tr>
                        <td style="font-weight: 600; color: #1e293b;">${row.customer_username}</td>
                        <td>$${parseFloat(row.balance || 0).toFixed(2)}</td>
                        <td>${pdfCellContent}</td>
                        <td>${sentBadge}</td>
                        <td style="font-size: 0.85rem;">${row.customer_email || '-'}</td>
                        <td>${date}</td>
                    </tr>
                `;
            }).join('');
        }

        async function runStartProcess() {
            if (!latestProcessRows || latestProcessRows.length === 0) {
                await fetchTodayProcesses();
            }

            if (!latestProcessRows || latestProcessRows.length === 0) {
                alert('No processes found for today to run.');
                return;
            }

            startProcessBtn.disabled = true;
            refreshProcessBtn.disabled = true;

            let processed = 0;
            let successCount = 0;
            let errorCount = 0;

            for (const row of latestProcessRows) {
                const username = row.customer_username;
                processed += 1;
                processStatus.textContent = `Processing ${username} (${processed}/${latestProcessRows.length})...`;

                try {
                    const res = await fetch('/.netlify/functions/statement_of_account-statement_table_calculation', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            customer_username: username,
                            action: 'generate_pdf'
                        })
                    });

                    let data = {};
                    try {
                        data = await res.json();
                    } catch (e) {
                        data = {};
                    }

                    if (res.ok && data.success !== false) {
                        successCount += 1;
                        console.log('PDF generated successfully for customer:', username, {
                            response: data,
                            httpStatus: res.status
                        });

                        // Try to update the in-memory row with the latest pdf_link-style value
                        let updatedPdfLink = null;
                        if (data && typeof data === 'object') {
                            // Case 1: Normal PDF generation, derive link from Power Automate response
                            const pa = data.power_automate_response;
                            if (pa && typeof pa === 'object' && !Array.isArray(pa)) {
                                const folderPath = pa.folder_path || '';
                                const fileName = pa.file_name || '';
                                const onedriveId = pa.onedrive_id || '';
                                updatedPdfLink = onedriveId || folderPath || null;
                            }

                            // Case 2: Our backend short-circuit for no orders / grand total 0
                            if (!updatedPdfLink && typeof data.message === 'string') {
                                if (data.message === 'No Orders' || data.message === 'Grand Total is 0') {
                                    updatedPdfLink = data.message;
                                }
                            }
                        }

                        if (updatedPdfLink) {
                            row.pdf_link = updatedPdfLink;
                            // Re-render table so the change is visible in real time
                            renderProcessTable(latestProcessRows);
                        }
                    } else {
                        errorCount += 1;
                        console.error('Error generating PDF for', username, data);
                    }
                } catch (err) {
                    errorCount += 1;
                    console.error('Error generating PDF for', username, err);
                }
            }

            processStatus.textContent = `Completed PDF generation. Success: ${successCount}, Errors: ${errorCount}.`;

            startProcessBtn.disabled = false;
            refreshProcessBtn.disabled = false;

            fetchTodayProcesses();
        }

        refreshProcessBtn.addEventListener('click', fetchTodayProcesses);
        startProcessBtn.addEventListener('click', runStartProcess);

        // Auto-fetch if processTab is opened
        const originalOpenTab = window.openTab;
        window.openTab = function(tabId) {
            originalOpenTab(tabId);
            if (tabId === 'processTab') {
                fetchTodayProcesses();
            }
        };
    </script>
</body>
</html>
